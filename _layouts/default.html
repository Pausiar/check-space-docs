<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="google-site-verification" content="lMgmviyzAEtdI4kk1GYr1Bmbf03BI3K5N0eMR3a0JBQ">
  <!-- AdSense se carga de forma condicional tras el consentimiento del usuario (RGPD) -->
  {% seo %}
  <meta property="og:image" content="{{ '/assets/images/og-image.svg' | absolute_url }}">
  <meta property="og:image:alt" content="Check Space analizador de espacio en disco para Windows">
  <meta name="twitter:image" content="{{ '/assets/images/og-image.svg' | absolute_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Check Space",
    "url": "https://check-space-docs.vercel.app",
    "description": "Free disk space analyzer for Windows that visualizes which files and folders are using the most storage on your PC.",
    "sameAs": [
      "https://github.com/Pausiar/check-space"
    ]
  }
  </script>
</head>
<body>
  {{ content }}

  <!-- ===== COOKIE BANNER ===== -->
  <div id="cookie-banner" class="cookie-banner" role="dialog" aria-live="polite" aria-label="Aviso de cookies" style="display:none;">
    <div class="cookie-banner__inner">
      <div class="cookie-banner__text">
        <strong>Usamos cookies</strong>
        <p>Este sitio utiliza cookies propias y de terceros (Google AdSense) para mostrar publicidad relevante. Puedes aceptarlas o rechazarlas.
          <a href="/politica-cookies/" class="cookie-banner__link">Política de cookies</a> ·
          <a href="/politica-privacidad/" class="cookie-banner__link">Privacidad</a>
        </p>
      </div>
      <div class="cookie-banner__actions">
        <button id="cookie-accept" class="btn btn--cookie">Aceptar cookies</button>
        <button id="cookie-reject" class="btn btn--cookie">Rechazar cookies</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      /* Carga AdSense de forma diferida solo si el usuario ha aceptado cookies (cumplimiento RGPD) */
      function loadAdSense() {
        if (document.querySelector('script[src*="adsbygoogle"]')) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7612805768657333';
        s.setAttribute('crossorigin', 'anonymous');
        document.head.appendChild(s);
      }

      /* Permite al usuario reabrir el banner para cambiar su preferencia */
      window.resetCookieConsent = function() {
        localStorage.removeItem('cookie-consent');
        document.getElementById('cookie-banner').style.display = 'flex';
      };

      var banner = document.getElementById('cookie-banner');
      var consent = localStorage.getItem('cookie-consent');

      if (consent === 'accepted') {
        loadAdSense();
      } else if (!consent) {
        banner.style.display = 'flex';
      }
      /* Si consent === 'rejected': no se muestra el banner, no se carga AdSense */

      document.getElementById('cookie-accept').addEventListener('click', function() {
        localStorage.setItem('cookie-consent', 'accepted');
        banner.style.display = 'none';
        loadAdSense();
      });
      document.getElementById('cookie-reject').addEventListener('click', function() {
        localStorage.setItem('cookie-consent', 'rejected');
        banner.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
